name: "git tag"

on:
  push:
    branches: [master]
    paths:
      - pyproject.toml

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          OLD=$(git show HEAD^:pyproject.toml | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
          NEW=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "old=$OLD"
          echo "new=$NEW"
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
            echo "major=$(echo $NEW | cut -d. -f1)" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push tags
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git tag -f "v${{ steps.version.outputs.major }}"
          git push origin "v${{ steps.version.outputs.version }}"
          git push -f origin "v${{ steps.version.outputs.major }}"
